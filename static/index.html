<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>长沙中考录取预测</title>
    <link rel="stylesheet" href="/predict/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="blessing">祝大家查分顺利，一飞冲天，未来可期！</div>

      <section class="predictor">
        <div class="intro">
          <p class="eyebrow">长沙中考录取预测</p>
          <h1>输入位次，查看冲稳保学校</h1>
          <div class="disclaimer" role="note">
            <strong>重要提示</strong>
            <p>
              本工具仅根据已录入的历史录取位次、招生变化和当前规则生成志愿参考，不代表官方录取结果，也不构成任何录取承诺。实际录取会受到当年招生计划、志愿填报热度、政策调整、指标生等因素影响，请以长沙市教育局及学校最终公布信息为准。
            </p>
          </div>
        </div>

        <form id="predictionForm" class="form">
          <label>
            <span>中考总分（可选）</span>
            <input id="score" name="score" type="number" min="1" max="630" step="1" placeholder="输入分数自动换算位次" />
          </label>
          <label>
            <span>位次</span>
            <input id="rank" name="rank" type="number" min="1" step="1" placeholder="例如 6881" />
          </label>
          <p id="rankingHint" class="ranking-hint">自动换算使用2026不含指标生一分一段表；推荐仍以位次为准。</p>
          <label>
            <span>综合素质</span>
            <select id="qualityLevel" name="qualityLevel">
              <option value="5A">5A</option>
              <option value="4A1B">4A1B</option>
              <option value="3A2B">3A2B</option>
              <option value="其他">其他</option>
            </select>
          </label>
          <button type="submit">开始预测</button>
        </form>
      </section>

      <section id="result" class="result hidden"></section>

      <footer class="footer">
        <p>预测结果仅供志愿填报参考，不构成录取承诺；实际录取以长沙市教育局最终公布为准。</p>
        <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">琼ICP备2023001981号-2</a>
      </footer>
    </main>

    <script src="/predict/static/app.js"></script>
  </body>
</html>
